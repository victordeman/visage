openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: VisageTrack AI Biometrics Attendance System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: attendance
    description: Attendance records

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Validation error or email taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get current user attendance stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/enroll:
    post:
      operationId: enrollUser
      tags: [users]
      summary: Enroll a new user with face biometric
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollRequest"
      responses:
        "201":
          description: User enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/mark:
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark attendance via face recognition
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceRequest"
      responses:
        "200":
          description: Attendance marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/face-match:
    post:
      operationId: faceMatch
      tags: [users]
      summary: Match face descriptor against enrolled users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaceMatchRequest"
      responses:
        "200":
          description: Match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaceMatchResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          default: student
      required:
        - firstName
        - lastName
        - email
        - password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        role:
          type: string
        userId:
          type: integer
        name:
          type: string
      required:
        - access_token
        - role
        - userId
        - name

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        department:
          type: string
        jobDesignation:
          type: string
        homeAddress:
          type: string
        dob:
          type: string
        hasEmbedding:
          type: boolean
        imagePath:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - hasEmbedding
        - createdAt

    UserStats:
      type: object
      properties:
        present:
          type: integer
        absent:
          type: integer
        total:
          type: integer
        presentPercentage:
          type: number
      required:
        - present
        - absent
        - total
        - presentPercentage

    EnrollRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
        department:
          type: string
        jobDesignation:
          type: string
        homeAddress:
          type: string
        dob:
          type: string
        faceDescriptor:
          type: array
          items:
            type: number
          description: 128-dimensional face descriptor vector from face-api.js
      required:
        - firstName
        - lastName
        - email
        - faceDescriptor

    EnrollResponse:
      type: object
      properties:
        message:
          type: string
        userId:
          type: integer
      required:
        - message
        - userId

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        timestamp:
          type: string
        status:
          type: string
        date:
          type: string
      required:
        - id
        - userId
        - timestamp
        - status

    MarkAttendanceRequest:
      type: object
      properties:
        userId:
          type: integer
        status:
          type: string
          enum: [present, absent, late]
      required:
        - userId
        - status

    FaceMatchRequest:
      type: object
      properties:
        descriptor:
          type: array
          items:
            type: number
          description: 128-dimensional face descriptor from face-api.js
      required:
        - descriptor

    FaceMatchResponse:
      type: object
      properties:
        matched:
          type: boolean
        userId:
          type: integer
          nullable: true
        userName:
          type: string
          nullable: true
        distance:
          type: number
          nullable: true
        role:
          type: string
          nullable: true
      required:
        - matched
